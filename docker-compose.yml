# LinkedIn Prospecting Agents - Docker Compose
# =============================================
# Deploy the entire prospecting pipeline in containers

version: '3.8'

services:
  # Main prospecting pipeline service
  prospecting-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: linkedin-prospecting-agent
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - LINKEDIN_API_KEY=${LINKEDIN_API_KEY}
      - NOTION_API_KEY=${NOTION_API_KEY}
      - NOTION_DATABASE_ID=${NOTION_DATABASE_ID}
      - PYTHONUNBUFFERED=1
    volumes:
      # Persist leads and state
      - ./leads:/app/leads
      - ./state:/app/state
      - ./logs:/app/logs
      - ./config.yaml:/app/config.yaml:ro
    working_dir: /app
    command: ["python", "cli.py", "pipeline", "--limit", "50"]
    restart: unless-stopped
    networks:
      - prospecting-network

  # Scheduled scout agent (runs every 6 hours)
  scout-scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: scout-scheduler
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - LINKEDIN_API_KEY=${LINKEDIN_API_KEY}
      - PYTHONUNBUFFERED=1
    volumes:
      - ./leads:/app/leads
      - ./config.yaml:/app/config.yaml:ro
    working_dir: /app
    command: >
      sh -c "
      while true; do
        python cli.py scout --limit 100;
        sleep 21600;
      done"
    restart: unless-stopped
    networks:
      - prospecting-network
    profiles:
      - scheduled

  # Follow-up processor (runs every hour)
  followup-scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: followup-scheduler
    environment:
      - LINKEDIN_API_KEY=${LINKEDIN_API_KEY}
      - NOTION_API_KEY=${NOTION_API_KEY}
      - NOTION_DATABASE_ID=${NOTION_DATABASE_ID}
      - PYTHONUNBUFFERED=1
    volumes:
      - ./state:/app/state
      - ./config.yaml:/app/config.yaml:ro
    working_dir: /app
    command: >
      sh -c "
      while true; do
        python cli.py followup;
        sleep 3600;
      done"
    restart: unless-stopped
    networks:
      - prospecting-network
    profiles:
      - scheduled

  # Web dashboard (optional, for monitoring)
  dashboard:
    image: python:3.11-slim
    container_name: prospecting-dashboard
    ports:
      - "8080:8080"
    volumes:
      - ./leads:/app/leads:ro
      - ./state:/app/state:ro
      - ./dashboard:/app/dashboard
    working_dir: /app/dashboard
    command: ["python", "-m", "http.server", "8080"]
    profiles:
      - dashboard
    networks:
      - prospecting-network

networks:
  prospecting-network:
    driver: bridge

volumes:
  leads:
  state:
  logs:
